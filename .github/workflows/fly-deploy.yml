# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main

jobs:
  test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/djd-agent-score-client/package-lock.json
            packages/djd-agent-score-mcp/package-lock.json
            packages/x402-agent-score/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  package-test:
    name: Verify package surfaces
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: packages/djd-agent-score-client
            bootstrap: ""
            install: npm ci
            verify: npm run typecheck && npm run build && npm pack --dry-run
          - path: packages/djd-agent-score-mcp
            bootstrap: npm ci --prefix packages/djd-agent-score-client
            install: npm ci
            verify: npm run typecheck && npm test && npm run build && npm pack --dry-run
          - path: packages/x402-agent-score
            bootstrap: ""
            install: npm ci
            verify: npm run typecheck && npm test && npm run build && npm pack --dry-run
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/djd-agent-score-client/package-lock.json
            packages/djd-agent-score-mcp/package-lock.json
            packages/x402-agent-score/package-lock.json
      - if: ${{ matrix.bootstrap != '' }}
        run: ${{ matrix.bootstrap }}
      - run: ${{ matrix.install }}
        working-directory: ${{ matrix.path }}
      - run: ${{ matrix.verify }}
        working-directory: ${{ matrix.path }}

  deploy:
    name: Deploy app
    needs:
      - test
      - package-test
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
